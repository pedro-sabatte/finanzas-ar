<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script>try{var _t=localStorage.getItem('jp_unlock_ts');if(!_t||(Date.now()-parseInt(_t))>=28800000)document.documentElement.style.visibility='hidden';}catch(e){}</script>
  <meta name="theme-color" content="#2C5BEC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cargar">
  <title>Finanzas P&amp;J — Cargar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/app-icon-form.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* =====================================================
       DESIGN TOKENS — Finanzas P&J (design system completo)
    ===================================================== */
    :root {
      /* Surface */
      --paper:        #FFFFFF;
      --paper-2:      #F6F7F9;
      --paper-3:      #EBEDF1;

      /* Ink */
      --ink:          #0B1220;
      --ink-2:        #4B5563;
      --ink-3:        #8A93A2;
      --ink-on-color: #FFFFFF;

      /* Hairlines */
      --hairline:     rgba(11,18,32,0.08);
      --hairline-2:   rgba(11,18,32,0.14);

      /* Brand / primary */
      --primary:      #2C5BEC;
      --primary-2:    #4970F0;
      --primary-soft: #2C5BEC0F;

      /* Currency */
      --peso:         #16A36A;
      --peso-soft:    #16A36A14;
      --dolar:        #2C5BEC;
      --dolar-soft:   #2C5BEC14;

      /* People */
      --pedro:        #2C5BEC;
      --pedro-soft:   #2C5BEC14;
      --juani:        #E26A77;
      --juani-soft:   #E26A7714;
      --conjunto:     #6B5BD2;
      --conjunto-soft:#6B5BD214;

      /* Semantic */
      --positive:     #16A36A;
      --positive-soft:#16A36A14;
      --alert:        #DC2A2A;
      --alert-soft:   #DC2A2A14;
      --warning:      #E6A100;
      --warning-soft: #E6A10014;

      /* Typography */
      --font-sans:    'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      --font-serif:   'Source Serif 4', ui-serif, Georgia, serif;
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

      /* Spacing scale */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-7: 32px;
      --s-8: 48px;
      --s-9: 64px;

      /* Radii */
      --r-1:    6px;
      --r-2:    10px;
      --r-3:    14px;
      --r-4:    22px;
      --r-full: 999px;

      /* Elevation */
      --shadow-1: 0 1px 0 rgba(21,24,29,0.03), 0 6px 16px -8px rgba(21,24,29,0.08);
      --shadow-2: 0 2px 0 rgba(21,24,29,0.03), 0 14px 32px -12px rgba(21,24,29,0.16);

      /* Motion */
      --ease:      cubic-bezier(0.2,0,0,1);
      --dur-fast:  180ms;
      --dur-base:  240ms;
      --dur-slow:  320ms;

      /* Layout */
      --col-max: 480px;
      --gutter:  20px;
    }

    /* Alpine cloak — evita flash de elementos ocultos al iniciar */
    [x-cloak] { display: none !important; }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      font-variant-numeric: tabular-nums;
      /* Inter: open-4 alt + slashed zero — mejoran legibilidad en finanzas */
      font-feature-settings: 'cv11', 'ss01';
      /* Seguridad en iPhone X+ */
      padding-top: env(safe-area-inset-top);
    }

    /* Todos los inputs y botones también tabular-nums */
    input, button, select, textarea {
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'cv11', 'ss01';
    }

    /* App shell */
    #app {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ---- Header ---- */
    .app-header {
      position: sticky; top: 0; z-index: 10;
      /* Blur para que el contenido deslice limpio por debajo */
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--hairline);
      padding: 18px 22px 14px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .app-header__greet {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink-3);
    }
    .app-header__name {
      font-size: 22px; font-weight: 600;
      letter-spacing: -0.015em; color: var(--ink);
      margin-top: 2px;
    }
    .brand-mark {
      font-family: var(--font-serif);
      font-weight: 500; font-size: 26px;
      color: var(--ink); letter-spacing: -0.02em;
      line-height: 1; flex-shrink: 0;
      text-decoration: none;
    }
    .brand-mark em { color: var(--primary); font-style: italic; }

    /* ---- Person toggle ---- */
    .person-toggle {
      display: flex; gap: 4px;
      background: var(--paper-2);
      border-radius: var(--r-full); padding: 3px;
    }
    .person-toggle button {
      border: none; cursor: pointer;
      padding: 5px 12px; border-radius: var(--r-full);
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 600;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }

    /* ---- Mode tabs ---- */
    .mode-tabs {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      border-bottom: 1px solid var(--hairline);
      background: var(--paper);
      flex-shrink: 0;
    }
    .mode-tabs button {
      border: none; background: transparent; cursor: pointer;
      padding: 12px 4px; position: relative;
      font-family: var(--font-sans);
      font-size: 13px; font-weight: 600;
      letter-spacing: -0.005em;
      transition: color var(--dur-fast) var(--ease);
    }
    .mode-tabs button.active { color: var(--ink); }
    .mode-tabs button:not(.active) { color: var(--ink-3); }
    .mode-tabs__indicator {
      position: absolute; bottom: -1px;
      left: 20%; right: 20%; height: 2px;
      background: var(--primary); border-radius: 2px;
    }

    /* ---- Pending banner ---- */
    .pending-banner {
      display: flex; align-items: center; gap: 10px;
      margin: 12px 20px 0;
      padding: 10px 12px;
      background: var(--conjunto-soft);
      border: 1px solid rgba(107,91,210,0.2);
      border-radius: var(--r-2);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease);
    }
    .pending-banner:hover { background: rgba(107,91,210,0.1); }
    .pending-banner__dot {
      width: 7px; height: 7px;
      border-radius: var(--r-full); background: var(--conjunto);
      flex-shrink: 0;
    }
    .pending-banner__text { flex: 1; font-size: 13px; color: var(--ink); }
    .pending-banner__arrow { color: var(--ink-2); font-size: 16px; }

    /* ---- Scrollable body ---- */
    .form-body {
      flex: 1; overflow-y: auto;
      padding: 14px var(--gutter) 24px;
      display: flex; flex-direction: column; gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    /* ---- Text field ---- */
    .field {
      background: var(--paper);
      border: 1px solid var(--hairline);
      border-radius: var(--r-3);
      padding: 10px 14px 12px;
      transition: border-color var(--dur-fast) var(--ease);
      cursor: text;
    }
    .field.focused { border-color: var(--ink); }
    .field__label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-2);
      display: flex; justify-content: space-between; align-items: center;
    }
    .field__label-chevron {
      font-size: 11px; color: var(--ink-3);
      text-transform: none; letter-spacing: 0;
      transition: transform var(--dur-base) var(--ease);
    }
    .field input {
      width: 100%; border: none; outline: none;
      background: transparent; padding: 4px 0 0;
      font-family: var(--font-sans);
      font-size: 16px; font-weight: 500;
      color: var(--ink); letter-spacing: -0.005em;
    }
    .field input::placeholder { color: var(--ink-3); }

    /* ---- Amount input ---- */
    .amount-field {
      background: var(--paper);
      border: 1px solid var(--hairline);
      border-radius: var(--r-3);
      padding: 14px 16px;
      transition: border-color var(--dur-fast) var(--ease);
      cursor: text;
    }
    .amount-field.focused { border-color: var(--ink); }
    .amount-field__inner {
      display: flex; align-items: center; gap: 8px;
    }
    .amount-field__symbol {
      font-size: 22px; font-weight: 500;
      color: var(--ink-3); font-variant-numeric: tabular-nums;
      flex-shrink: 0; line-height: 1;
    }
    .amount-field__number {
      font-size: 34px; font-weight: 500;
      letter-spacing: -0.015em;
      font-variant-numeric: tabular-nums;
      color: var(--ink); flex: 1; line-height: 1.1;
    }
    .amount-field__number.empty { color: var(--ink-3); }
    /* Input real — invisible, solo recibe el teclado */
    .amount-field input {
      position: absolute; opacity: 0;
      width: 1px; height: 1px; pointer-events: none;
    }
    .currency-toggle {
      display: inline-flex;
      background: var(--paper-2);
      border-radius: var(--r-full); padding: 3px;
      flex-shrink: 0;
    }
    .currency-toggle button {
      border: none; cursor: pointer;
      padding: 5px 12px; border-radius: var(--r-full);
      font-size: 11px; font-weight: 600;
      font-family: var(--font-sans);
      letter-spacing: 0.02em;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
    }
    .currency-toggle button.active {
      background: var(--primary); color: var(--ink-on-color);
    }
    .currency-toggle button:not(.active) {
      background: transparent; color: var(--ink-2);
    }

    /* ---- Custom dropdown ---- */
    .dropdown { position: relative; }
    .dropdown__menu {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 40;
      background: var(--paper);
      border: 1px solid var(--hairline-2);
      border-radius: var(--r-3);
      box-shadow: 0 8px 24px -8px rgba(11,18,32,0.18);
      overflow: hidden; max-height: 260px; overflow-y: auto;
    }
    .dropdown__option {
      width: 100%; text-align: left; cursor: pointer;
      border: none; border-bottom: 1px solid var(--hairline);
      background: var(--paper);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-sans); font-size: 15px;
      color: var(--ink);
      transition: background var(--dur-fast) var(--ease);
    }
    .dropdown__option:last-child { border-bottom: 0; }
    .dropdown__option:hover { background: var(--paper-2); }
    .dropdown__option.selected { background: var(--paper-2); font-weight: 500; }
    .dropdown__check { color: var(--primary); font-size: 14px; margin-left: auto; }
    .dropdown__dot { width: 8px; height: 8px; border-radius: var(--r-full); flex-shrink: 0; }

    /* ---- Sub-toggle (Transferencia / Compra / Venta) ---- */
    .sub-toggle { display: flex; gap: 6px; }
    .sub-toggle button {
      flex: 1; padding: 8px 10px; border-radius: var(--r-full);
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease), border-color var(--dur-fast) var(--ease);
    }
    .sub-toggle button.active {
      border: 1px solid var(--ink);
      background: var(--ink); color: var(--ink-on-color);
    }
    .sub-toggle button:not(.active) {
      border: 1px solid var(--hairline);
      background: var(--paper); color: var(--ink-2);
    }

    /* ---- Expand link ---- */
    .expand-link {
      background: transparent; border: none; cursor: pointer;
      text-align: left; padding: 4px 2px;
      font-family: var(--font-sans); font-size: 13px;
      color: var(--ink-2);
      transition: color var(--dur-fast) var(--ease);
    }
    .expand-link:hover { color: var(--ink); }

    /* ---- Section label ---- */
    .section-label {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-2); margin-top: 6px;
    }

    /* ---- Movement row ---- */
    .movement-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .movement-row:last-child { border-bottom: 0; }
    .movement-row__icon {
      width: 32px; height: 32px; border-radius: var(--r-1);
      background: var(--paper-2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .movement-row__dot { width: 6px; height: 6px; border-radius: var(--r-full); }
    .movement-row__title {
      font-size: 14px; font-weight: 500; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .movement-row__sub { font-size: 12px; color: var(--ink-3); margin-top: 1px; }
    .movement-row__amount {
      font-size: 14px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .movement-row__dup {
      font-size: 11px; color: var(--ink-3);
      cursor: pointer; background: none; border: none;
      padding: 0; font-family: var(--font-sans);
      transition: color var(--dur-fast) var(--ease);
      display: block; margin-top: 2px;
    }
    .movement-row__dup:hover { color: var(--primary); }

    /* ---- Bottom bar ---- */
    .bottom-bar {
      padding: 12px var(--gutter) 28px;
      background: var(--paper);
      border-top: 1px solid var(--hairline);
      flex-shrink: 0;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }
    .btn-guardar {
      width: 100%; height: 54px; border: none; border-radius: var(--r-3);
      font-family: var(--font-sans); font-size: 16px; font-weight: 600;
      letter-spacing: -0.005em; cursor: pointer;
      transition: transform var(--dur-fast) var(--ease), background var(--dur-fast) var(--ease);
    }
    .btn-guardar:not(:disabled) { background: var(--primary); color: var(--ink-on-color); }
    .btn-guardar:not(:disabled):active { transform: scale(0.98); }
    .btn-guardar:disabled { background: var(--paper-3); color: var(--ink-3); cursor: default; }

    /* ---- Toast ---- */
    .toast {
      position: absolute; left: 20px; right: 20px; bottom: 96px; z-index: 30;
      display: flex; align-items: center; gap: 12px;
      background: var(--ink); color: var(--ink-on-color);
      padding: 14px 16px; border-radius: var(--r-3);
      box-shadow: var(--shadow-2);
      animation: toastIn var(--dur-base) var(--ease) both;
    }
    .toast__dot { width: 8px; height: 8px; border-radius: var(--r-full); background: #5DBE92; flex-shrink: 0; }
    .toast__msg { flex: 1; font-size: 14px; font-weight: 500; }
    .toast__undo {
      font-size: 13px; color: #A8B0C0; cursor: pointer;
      background: none; border: none; font-family: var(--font-sans); padding: 0;
      transition: color var(--dur-fast) var(--ease);
    }
    .toast__undo:hover { color: #FFFFFF; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Loading overlay ---- */
    .loading-overlay {
      position: absolute; inset: 0; z-index: 50;
      background: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--paper-3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Error banner ---- */
    .error-banner {
      margin: 0 var(--gutter) 10px;
      padding: 10px 14px;
      background: var(--alert-soft);
      border: 1px solid rgba(220,42,42,0.2);
      border-radius: var(--r-2); font-size: 13px; color: var(--alert);
    }

    /* ---- Dropdown value placeholder ---- */
    .field-value {
      font-size: 16px; font-weight: 500;
      color: var(--ink); padding-top: 4px;
    }
    .field-value.empty { color: var(--ink-3); font-weight: 400; }
  </style>
</head>
<body>

<!-- Config + helpers cargados antes de Alpine -->
<script src="config.local.js" onerror="console.warn('config.local.js no encontrado. Copiá config.local.example.js')"></script>
<script src="../shared/formatters.js"></script>
<script src="../shared/api-client.js"></script>

<div id="app" x-data="formApp()" x-init="init()">

  <!-- HEADER -->
  <header class="app-header">
    <!-- Brand mark → volver al inicio -->
    <a href="../" class="brand-mark">J<em>&amp;</em>P</a>
    <div style="flex:1"></div>
    <!-- Toggle Pedro / Juani -->
    <div class="person-toggle">
      <button
        :style="`background:${persona==='Pedro' ? '#2C5BEC' : 'transparent'}; color:${persona==='Pedro' ? '#fff' : '#4B5563'}`"
        @click="setPersona('Pedro')">Pedro</button>
      <button
        :style="`background:${persona==='Juani' ? '#E26A77' : 'transparent'}; color:${persona==='Juani' ? '#fff' : '#4B5563'}`"
        @click="setPersona('Juani')">Juani</button>
    </div>
  </header>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <template x-for="tab in tabs" :key="tab.id">
      <button
        :class="modo === tab.id ? 'active' : ''"
        @click="modo = tab.id; resetForm()">
        <span x-text="tab.label"></span>
        <div class="mode-tabs__indicator" x-show="modo === tab.id"></div>
      </button>
    </template>
  </div>

  <!-- PENDING BANNERS — recurrentes variables sin monto -->
  <template x-for="rec in recurrentesPendientes" :key="rec.id">
    <div class="pending-banner" @click="precargarRecurrente(rec)">
      <div class="pending-banner__dot"></div>
      <div class="pending-banner__text">
        Pendiente: cargar monto de <b x-text="rec.nombre"></b>
      </div>
      <div class="pending-banner__arrow">→</div>
    </div>
  </template>

  <!-- ERROR BANNER -->
  <div class="error-banner" x-show="errorMsg" x-cloak x-text="errorMsg"></div>

  <!-- SCROLLABLE FORM BODY -->
  <div class="form-body">

    <!-- ============ GASTO ============ -->
    <template x-if="modo === 'gasto'">
      <div style="display:flex;flex-direction:column;gap:10px">

        <!-- Título -->
        <label class="field" :class="campoFocused==='titulo' ? 'focused' : ''">
          <div class="field__label">Título</div>
          <input type="text" x-model="form.titulo"
            placeholder="Café Felix, super, nafta…"
            @focus="campoFocused='titulo'" @blur="campoFocused=''"
            inputmode="text" autocomplete="off">
        </label>

        <!-- Monto + moneda -->
        <div class="amount-field" :class="campoFocused==='monto' ? 'focused' : ''"
          @click="$refs.montoInput.focus()">
          <div class="amount-field__inner">
            <span class="amount-field__symbol" x-text="form.moneda === 'ARS' ? '$' : 'U$S'"></span>
            <div class="amount-field__number" :class="!form.monto ? 'empty'"
              x-text="form.monto
                ? (form.moneda==='ARS' ? fmt.ars(form.monto) : fmt.usd(form.monto, 2))
                : '0'">
            </div>
            <input type="number" x-ref="montoInput" x-model="form.monto"
              inputmode="decimal" step="0.01"
              @focus="campoFocused='monto'" @blur="campoFocused=''">
            <div class="currency-toggle">
              <button :class="form.moneda==='ARS' ? 'active' : ''" @click.stop="form.moneda='ARS'">ARS</button>
              <button :class="form.moneda==='USD' ? 'active' : ''" @click.stop="form.moneda='USD'">USD</button>
            </div>
          </div>
        </div>

        <!-- Categoría -->
        <div class="dropdown">
          <div class="field" :class="dropdownAbierto==='categoria' ? 'focused' : ''"
            @click="toggleDropdown('categoria')">
            <div class="field__label">
              <span>Categoría</span>
              <span class="field__label-chevron"
                :style="dropdownAbierto==='categoria' ? 'transform:rotate(180deg)' : ''">▾</span>
            </div>
            <div class="field-value" :class="!form.categoria ? 'empty'"
              x-text="form.categoria || 'Seleccioná una categoría'"></div>
          </div>
          <div class="dropdown__menu" x-show="dropdownAbierto==='categoria'" @click.outside="dropdownAbierto=''">
            <template x-for="cat in catalogos.categorias_gasto" :key="cat">
              <button class="dropdown__option" :class="form.categoria===cat ? 'selected' : ''"
                @click="form.categoria=cat; dropdownAbierto=''">
                <span style="flex:1" x-text="cat"></span>
                <span class="dropdown__check" x-show="form.categoria===cat">✓</span>
              </button>
            </template>
          </div>
        </div>

        <!-- Medio de pago -->
        <div class="dropdown">
          <div class="field" :class="dropdownAbierto==='medio' ? 'focused' : ''"
            @click="toggleDropdown('medio')">
            <div class="field__label">
              <span>Medio de pago</span>
              <span class="field__label-chevron"
                :style="dropdownAbierto==='medio' ? 'transform:rotate(180deg)' : ''">▾</span>
            </div>
            <div class="field-value" :class="!form.medio_pago ? 'empty'"
              x-text="form.medio_pago || 'Seleccioná un medio'"></div>
          </div>
          <div class="dropdown__menu" x-show="dropdownAbierto==='medio'" @click.outside="dropdownAbierto=''">
            <template x-for="t in catalogos.tarjetas" :key="t.nombre">
              <button class="dropdown__option" :class="form.medio_pago===t.nombre ? 'selected' : ''"
                @click="form.medio_pago=t.nombre; dropdownAbierto=''">
                <span style="flex:1" x-text="t.nombre"></span>
                <span class="dropdown__check" x-show="form.medio_pago===t.nombre">✓</span>
              </button>
            </template>
            <button class="dropdown__option" :class="form.medio_pago==='Efectivo' ? 'selected' : ''"
              @click="form.medio_pago='Efectivo'; dropdownAbierto=''">
              <span style="flex:1">Efectivo</span>
              <span class="dropdown__check" x-show="form.medio_pago==='Efectivo'">✓</span>
            </button>
          </div>
        </div>

        <!-- Más campos (expandible) -->
        <template x-if="!mostrarMasCampos">
          <button class="expand-link" @click="mostrarMasCampos=true">
            + Más campos (quién, cuotas, reintegro…)
          </button>
        </template>

        <template x-if="mostrarMasCampos">
          <div style="display:flex;flex-direction:column;gap:10px">

            <!-- Quién lo gastó -->
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='quien' ? 'focused' : ''"
                @click="toggleDropdown('quien')">
                <div class="field__label">
                  <span>Quién lo gastó</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='quien' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" style="display:flex;align-items:center;gap:8px">
                  <span class="dropdown__dot"
                    :style="`background:${personaColor(form.quien_gasto)}`"></span>
                  <span x-text="form.quien_gasto"></span>
                </div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='quien'" @click.outside="dropdownAbierto=''">
                <template x-for="q in ['Conjunto','Pedro','Juani']" :key="q">
                  <button class="dropdown__option" :class="form.quien_gasto===q ? 'selected' : ''"
                    @click="form.quien_gasto=q; dropdownAbierto=''">
                    <span class="dropdown__dot" :style="`background:${personaColor(q)}`"></span>
                    <span style="flex:1" x-text="q"></span>
                    <span class="dropdown__check" x-show="form.quien_gasto===q">✓</span>
                  </button>
                </template>
              </div>
            </div>

            <!-- Cuotas -->
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='cuotas' ? 'focused' : ''"
                @click="toggleDropdown('cuotas')">
                <div class="field__label">
                  <span>Cuotas</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='cuotas' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value"
                  x-text="form.cuotas_total === 1 ? '1 cuota (contado)' : form.cuotas_total + ' cuotas'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='cuotas'" @click.outside="dropdownAbierto=''">
                <template x-for="n in [1,3,6,9,12,18,24]" :key="n">
                  <button class="dropdown__option" :class="form.cuotas_total===n ? 'selected' : ''"
                    @click="form.cuotas_total=n; dropdownAbierto=''">
                    <span style="flex:1" x-text="n===1 ? '1 cuota (contado)' : n+' cuotas'"></span>
                    <span class="dropdown__check" x-show="form.cuotas_total===n">✓</span>
                  </button>
                </template>
              </div>
            </div>

            <!-- Reintegro de… -->
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='reintegro' ? 'focused' : ''"
                @click="toggleDropdown('reintegro')">
                <div class="field__label">
                  <span>Es reintegro de… (opcional)</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='reintegro' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" :class="!form.reintegro_de_movimiento_id ? 'empty'"
                  x-text="form.reintegro_de_movimiento_id
                    ? (ultimosMovimientos.find(m=>m.id===form.reintegro_de_movimiento_id)?.titulo || 'Movimiento seleccionado')
                    : 'Ninguno'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='reintegro'" @click.outside="dropdownAbierto=''">
                <button class="dropdown__option" :class="!form.reintegro_de_movimiento_id ? 'selected' : ''"
                  @click="form.reintegro_de_movimiento_id=''; dropdownAbierto=''">
                  <span style="flex:1;color:var(--ink-3)">Ninguno</span>
                </button>
                <template x-for="mv in ultimosMovimientos.filter(m=>m.tipo==='gasto').slice(0,10)" :key="mv.id">
                  <button class="dropdown__option" :class="form.reintegro_de_movimiento_id===mv.id ? 'selected' : ''"
                    @click="form.reintegro_de_movimiento_id=mv.id; dropdownAbierto=''">
                    <span style="flex:1"
                      x-text="mv.titulo + ' — ' + (mv.moneda==='ARS'?'$ ':'U$S ') + formatMonto(mv.monto, mv.moneda)"></span>
                    <span class="dropdown__check" x-show="form.reintegro_de_movimiento_id===mv.id">✓</span>
                  </button>
                </template>
              </div>
            </div>

            <!-- Descripción -->
            <label class="field" :class="campoFocused==='descripcion' ? 'focused' : ''">
              <div class="field__label">Descripción (opcional)</div>
              <input type="text" x-model="form.descripcion" placeholder="Notas adicionales…"
                @focus="campoFocused='descripcion'" @blur="campoFocused=''">
            </label>

            <button class="expand-link" @click="mostrarMasCampos=false">← Ocultar campos extra</button>
          </div>
        </template>
      </div>
    </template>

    <!-- ============ INGRESO ============ -->
    <template x-if="modo === 'ingreso'">
      <div style="display:flex;flex-direction:column;gap:10px">

        <label class="field" :class="campoFocused==='titulo' ? 'focused' : ''">
          <div class="field__label">Título</div>
          <input type="text" x-model="form.titulo"
            placeholder="Sueldo mayo, freelance proyecto X…"
            @focus="campoFocused='titulo'" @blur="campoFocused=''">
        </label>

        <div class="amount-field" :class="campoFocused==='monto' ? 'focused' : ''"
          @click="$refs.montoInput.focus()">
          <div class="amount-field__inner">
            <span class="amount-field__symbol" x-text="form.moneda==='ARS' ? '$' : 'U$S'"></span>
            <div class="amount-field__number" :class="!form.monto ? 'empty'"
              x-text="form.monto
                ? (form.moneda==='ARS' ? fmt.ars(form.monto) : fmt.usd(form.monto, 2))
                : '0'">
            </div>
            <input type="number" x-ref="montoInput" x-model="form.monto"
              inputmode="decimal" step="0.01"
              @focus="campoFocused='monto'" @blur="campoFocused=''">
            <div class="currency-toggle">
              <button :class="form.moneda==='ARS' ? 'active' : ''" @click.stop="form.moneda='ARS'">ARS</button>
              <button :class="form.moneda==='USD' ? 'active' : ''" @click.stop="form.moneda='USD'">USD</button>
            </div>
          </div>
        </div>

        <div class="dropdown">
          <div class="field" :class="dropdownAbierto==='categoria' ? 'focused' : ''"
            @click="toggleDropdown('categoria')">
            <div class="field__label">
              <span>Categoría</span>
              <span class="field__label-chevron"
                :style="dropdownAbierto==='categoria' ? 'transform:rotate(180deg)' : ''">▾</span>
            </div>
            <div class="field-value" :class="!form.categoria ? 'empty'"
              x-text="form.categoria || 'Seleccioná una categoría'"></div>
          </div>
          <div class="dropdown__menu" x-show="dropdownAbierto==='categoria'" @click.outside="dropdownAbierto=''">
            <template x-for="cat in catalogos.categorias_ingreso" :key="cat">
              <button class="dropdown__option" :class="form.categoria===cat ? 'selected' : ''"
                @click="form.categoria=cat; dropdownAbierto=''">
                <span style="flex:1" x-text="cat"></span>
                <span class="dropdown__check" x-show="form.categoria===cat">✓</span>
              </button>
            </template>
          </div>
        </div>

        <div class="dropdown">
          <div class="field" :class="dropdownAbierto==='cuenta' ? 'focused' : ''"
            @click="toggleDropdown('cuenta')">
            <div class="field__label">
              <span>Cuenta destino</span>
              <span class="field__label-chevron"
                :style="dropdownAbierto==='cuenta' ? 'transform:rotate(180deg)' : ''">▾</span>
            </div>
            <div class="field-value" :class="!form.cuenta_destino ? 'empty'"
              x-text="form.cuenta_destino || 'Seleccioná una cuenta'"></div>
          </div>
          <div class="dropdown__menu" x-show="dropdownAbierto==='cuenta'" @click.outside="dropdownAbierto=''">
            <template x-for="c in catalogos.cuentas" :key="c.nombre">
              <button class="dropdown__option" :class="form.cuenta_destino===c.nombre ? 'selected' : ''"
                @click="form.cuenta_destino=c.nombre; dropdownAbierto=''">
                <span style="flex:1" x-text="c.nombre"></span>
                <span class="dropdown__check" x-show="form.cuenta_destino===c.nombre">✓</span>
              </button>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ============ MOV. INTERNO ============ -->
    <template x-if="modo === 'interno'">
      <div style="display:flex;flex-direction:column;gap:10px">

        <!-- Sub-toggle -->
        <div class="sub-toggle">
          <template x-for="sub in ['Transferencia','Compra activo','Venta activo']" :key="sub">
            <button :class="subModo===sub ? 'active' : ''" @click="subModo=sub">
              <span x-text="sub"></span>
            </button>
          </template>
        </div>

        <label class="field" :class="campoFocused==='titulo' ? 'focused' : ''">
          <div class="field__label">Título</div>
          <input type="text" x-model="form.titulo"
            :placeholder="subModo==='Transferencia' ? 'Pasaje a USD, fondeo MP…' : 'Compra ETF VOO, venta AL30…'"
            @focus="campoFocused='titulo'" @blur="campoFocused=''">
        </label>

        <div class="amount-field" :class="campoFocused==='monto' ? 'focused' : ''"
          @click="$refs.montoInput.focus()">
          <div class="amount-field__inner">
            <span class="amount-field__symbol" x-text="form.moneda==='ARS' ? '$' : 'U$S'"></span>
            <div class="amount-field__number" :class="!form.monto ? 'empty'"
              x-text="form.monto
                ? (form.moneda==='ARS' ? fmt.ars(form.monto) : fmt.usd(form.monto, 2))
                : '0'">
            </div>
            <input type="number" x-ref="montoInput" x-model="form.monto"
              inputmode="decimal" step="0.01"
              @focus="campoFocused='monto'" @blur="campoFocused=''">
            <div class="currency-toggle">
              <button :class="form.moneda==='ARS' ? 'active' : ''" @click.stop="form.moneda='ARS'">ARS</button>
              <button :class="form.moneda==='USD' ? 'active' : ''" @click.stop="form.moneda='USD'">USD</button>
            </div>
          </div>
        </div>

        <!-- Transferencia: origen + destino -->
        <template x-if="subModo==='Transferencia'">
          <div style="display:flex;flex-direction:column;gap:10px">
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='origen' ? 'focused' : ''"
                @click="toggleDropdown('origen')">
                <div class="field__label">
                  <span>Cuenta origen</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='origen' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" :class="!form.cuenta_origen ? 'empty'"
                  x-text="form.cuenta_origen || 'Seleccioná'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='origen'" @click.outside="dropdownAbierto=''">
                <template x-for="c in catalogos.cuentas" :key="c.nombre">
                  <button class="dropdown__option" :class="form.cuenta_origen===c.nombre ? 'selected' : ''"
                    @click="form.cuenta_origen=c.nombre; dropdownAbierto=''">
                    <span style="flex:1" x-text="c.nombre"></span>
                    <span class="dropdown__check" x-show="form.cuenta_origen===c.nombre">✓</span>
                  </button>
                </template>
              </div>
            </div>
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='destino' ? 'focused' : ''"
                @click="toggleDropdown('destino')">
                <div class="field__label">
                  <span>Cuenta destino</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='destino' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" :class="!form.cuenta_destino ? 'empty'"
                  x-text="form.cuenta_destino || 'Seleccioná'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='destino'" @click.outside="dropdownAbierto=''">
                <template x-for="c in catalogos.cuentas" :key="c.nombre">
                  <button class="dropdown__option" :class="form.cuenta_destino===c.nombre ? 'selected' : ''"
                    @click="form.cuenta_destino=c.nombre; dropdownAbierto=''">
                    <span style="flex:1" x-text="c.nombre"></span>
                    <span class="dropdown__check" x-show="form.cuenta_destino===c.nombre">✓</span>
                  </button>
                </template>
              </div>
            </div>
          </div>
        </template>

        <!-- Compra / Venta activo -->
        <template x-if="subModo==='Compra activo' || subModo==='Venta activo'">
          <div style="display:flex;flex-direction:column;gap:10px">
            <label class="field" :class="campoFocused==='ticker' ? 'focused' : ''">
              <div class="field__label">Activo (ticker)</div>
              <input type="text" x-model="form.activo_ticker"
                placeholder="VOO, AL30, GGAL…"
                style="text-transform:uppercase"
                @focus="campoFocused='ticker'" @blur="campoFocused=''">
            </label>
            <label class="field" :class="campoFocused==='cantidad' ? 'focused' : ''">
              <div class="field__label">Cantidad</div>
              <input type="number" x-model="form.cantidad"
                inputmode="decimal" step="0.0001" placeholder="0"
                @focus="campoFocused='cantidad'" @blur="campoFocused=''">
            </label>
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='plataforma' ? 'focused' : ''"
                @click="toggleDropdown('plataforma')">
                <div class="field__label">
                  <span>Plataforma</span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='plataforma' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" :class="!form.plataforma ? 'empty'"
                  x-text="form.plataforma || 'Seleccioná'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='plataforma'" @click.outside="dropdownAbierto=''">
                <template x-for="p in ['Santander FCI','Inviu','ARQ']" :key="p">
                  <button class="dropdown__option" :class="form.plataforma===p ? 'selected' : ''"
                    @click="form.plataforma=p; dropdownAbierto=''">
                    <span style="flex:1" x-text="p"></span>
                    <span class="dropdown__check" x-show="form.plataforma===p">✓</span>
                  </button>
                </template>
              </div>
            </div>
            <div class="dropdown">
              <div class="field" :class="dropdownAbierto==='cuentaPaga' ? 'focused' : ''"
                @click="toggleDropdown('cuentaPaga')">
                <div class="field__label">
                  <span x-text="subModo==='Compra activo' ? 'Cuenta que paga' : 'Cuenta que recibe'"></span>
                  <span class="field__label-chevron"
                    :style="dropdownAbierto==='cuentaPaga' ? 'transform:rotate(180deg)' : ''">▾</span>
                </div>
                <div class="field-value" :class="!form.cuenta_origen ? 'empty'"
                  x-text="form.cuenta_origen || 'Seleccioná'"></div>
              </div>
              <div class="dropdown__menu" x-show="dropdownAbierto==='cuentaPaga'" @click.outside="dropdownAbierto=''">
                <template x-for="c in catalogos.cuentas" :key="c.nombre">
                  <button class="dropdown__option" :class="form.cuenta_origen===c.nombre ? 'selected' : ''"
                    @click="form.cuenta_origen=c.nombre; dropdownAbierto=''">
                    <span style="flex:1" x-text="c.nombre"></span>
                    <span class="dropdown__check" x-show="form.cuenta_origen===c.nombre">✓</span>
                  </button>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- ÚLTIMOS MOVIMIENTOS -->
    <div class="section-label" style="margin-top:14px">Últimos movimientos</div>
    <div>
      <template x-for="mv in ultimosMovimientos.slice(0,5)" :key="mv.id">
        <div class="movement-row">
          <div class="movement-row__icon">
            <div class="movement-row__dot"
              :style="`background:${personaColor(mv.quien_gasto || mv.cargado_por)}`"></div>
          </div>
          <div style="flex:1;min-width:0">
            <div class="movement-row__title" x-text="mv.titulo || mv.categoria"></div>
            <div class="movement-row__sub"
              x-text="(mv.categoria || mv.tipo) + (mv.medio_pago ? ' · ' + mv.medio_pago : '')"></div>
          </div>
          <div style="text-align:right">
            <div class="movement-row__amount"
              :style="`color:${mv.moneda==='USD' ? 'var(--dolar)' : 'var(--peso)'}`"
              x-text="(mv.moneda==='ARS' ? '$ ' : 'U$S ') + formatMonto(mv.monto, mv.moneda)"></div>
            <button class="movement-row__dup" @click="duplicar(mv)">Duplicar →</button>
          </div>
        </div>
      </template>
      <div x-show="ultimosMovimientos.length === 0"
        style="text-align:center;color:var(--ink-3);font-size:14px;padding:20px 0">
        Aún no hay movimientos cargados
      </div>
    </div>

  </div><!-- /form-body -->

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="btn-guardar"
      :disabled="!form.monto || loading"
      @click="guardar()"
      x-text="loading ? 'Guardando…' : labelGuardar()">
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" x-show="toast.visible" x-cloak>
    <div class="toast__dot"></div>
    <div class="toast__msg" x-text="toast.msg"></div>
    <button class="toast__undo" @click="deshacer()">Deshacer</button>
  </div>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" x-show="loading && !toast.visible" x-cloak>
    <div class="spinner"></div>
  </div>

</div><!-- /app -->

<script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
<script src="../shared/pin-lock.js"></script>
</body>
</html>
